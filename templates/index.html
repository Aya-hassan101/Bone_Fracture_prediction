<!DOCTYPE html>
<html>
<head>
    <title>X-Ray Detector</title>
</head>
<body>

<h1>X-Ray Fracture Detection</h1>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="file">
    <button type="submit">Predict</button>
</form>

{% if result %}
    <h2>{{ result }}</h2>
{% endif %}

{% if image_path %}
    <img src="{{ image_path }}" width="300">
{% endif %}

</body>
</html>
